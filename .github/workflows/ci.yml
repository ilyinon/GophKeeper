name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go tests and generated docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Generate Swagger
        run: make swagger

      - name: Ensure generated Swagger is committed
        run: git diff --exit-code docs/swagger/gophkeeper.swagger.json

      - name: Build binaries
        run: make build

  functional:
    name: Functional tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: gophkeeper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d gophkeeper"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run functional tests
        env:
          GOPHKEEPER_FUNC_DATABASE_URL: postgres://user:pass@127.0.0.1:5432/gophkeeper?sslmode=disable
        run: make functional
