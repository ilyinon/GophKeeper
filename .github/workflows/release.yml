name: Release client binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build-client:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build client
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DIST_DIR="dist/gophkeeper-client_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "${DIST_DIR}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.buildVersion=${VERSION} -X main.buildDate=${BUILD_DATE}" \
            -o "${DIST_DIR}/gophkeeper-client${{ matrix.ext }}" \
            ./cmd/gophkeeper-client
          cp README.md "${DIST_DIR}/README.md"

      - name: Pack archive
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          NAME="gophkeeper-client_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "${NAME}.zip" "${NAME}"
            shasum -a 256 "${NAME}.zip" > "${NAME}.zip.sha256"
          else
            tar -czf "${NAME}.tar.gz" "${NAME}"
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gophkeeper-client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build-client
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "GophKeeper ${GITHUB_REF_NAME}" \
            --notes "CLI binaries for Windows, Linux, and macOS. Download the archive matching your operating system and CPU architecture."
