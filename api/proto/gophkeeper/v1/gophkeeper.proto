syntax = "proto3";

package gophkeeper.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/oilyin/gophkeeper/internal/transport/grpc/pb/gophkeeper/v1;gophkeeperv1";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "GophKeeper API"
    version: "1.0.0"
    description: "Swagger description generated from the GophKeeper gRPC proto contract. The production transport is gRPC; HTTP paths document the equivalent JSON mapping. Byte fields are base64-encoded strings."
  }
  schemes: HTTP
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "JWT access token in the form: Bearer <token>"
      }
    }
  }
  tags: {
    name: "AuthService"
    description: "Registration and authentication methods."
  }
  tags: {
    name: "VaultService"
    description: "Opaque encrypted vault item methods."
  }
};

service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Register a new user"
      operation_id: "AuthService_Register"
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.AuthService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "Register"}
      }
    };
  }

  rpc Login(LoginRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Authenticate an existing user"
      operation_id: "AuthService_Login"
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.AuthService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "Login"}
      }
    };
  }
}

service VaultService {
  rpc CreateItem(CreateItemRequest) returns (ItemHeader) {
    option (google.api.http) = {
      post: "/v1/items"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create an opaque encrypted vault item"
      operation_id: "VaultService_CreateItem"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.VaultService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "CreateItem"}
      }
    };
  }

  rpc UpdateItem(UpdateItemRequest) returns (ItemHeader) {
    option (google.api.http) = {
      put: "/v1/items/{id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update an opaque encrypted vault item"
      operation_id: "VaultService_UpdateItem"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.VaultService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "UpdateItem"}
      }
    };
  }

  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse) {
    option (google.api.http) = {
      delete: "/v1/items/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete an opaque encrypted vault item"
      operation_id: "VaultService_DeleteItem"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.VaultService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "DeleteItem"}
      }
    };
  }

  rpc GetItem(GetItemRequest) returns (EncryptedItem) {
    option (google.api.http) = {
      get: "/v1/items/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get one opaque encrypted vault item"
      operation_id: "VaultService_GetItem"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.VaultService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "GetItem"}
      }
    };
  }

  rpc ListItems(ListItemsRequest) returns (ListItemsResponse) {
    option (google.api.http) = {
      get: "/v1/items"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List opaque encrypted vault items"
      operation_id: "VaultService_ListItems"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.VaultService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "ListItems"}
      }
    };
  }

  rpc Sync(SyncRequest) returns (SyncResponse) {
    option (google.api.http) = {
      get: "/v1/sync"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Synchronize opaque encrypted item changes"
      operation_id: "VaultService_Sync"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
      extensions: {
        key: "x-grpc-service"
        value: {string_value: "gophkeeper.v1.VaultService"}
      }
      extensions: {
        key: "x-grpc-method"
        value: {string_value: "Sync"}
      }
    };
  }
}

message RegisterRequest {
  string login = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "User login."
    min_length: 3
  }];
  string password = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "User password."
    min_length: 8
    format: "password"
  }];
  bytes kdf_salt = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded client KDF salt."
    format: "byte"
  }];
}

message LoginRequest {
  string login = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "User login."
  }];
  string password = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "User password."
    format: "password"
  }];
}

message AuthResponse {
  string user_id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Authenticated user UUID."
  }];
  string access_token = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "JWT access token."
  }];
  google.protobuf.Timestamp expires_at = 3;
  bytes kdf_salt = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded client KDF salt."
    format: "byte"
  }];
}

message CreateItemRequest {
  string id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Optional client-generated item UUID."
  }];
  bytes nonce = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded AES-GCM nonce."
    format: "byte"
  }];
  bytes ciphertext = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded encrypted client payload."
    format: "byte"
  }];
}

message UpdateItemRequest {
  string id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Vault item UUID."
  }];
  int64 expected_revision = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Optimistic concurrency revision expected by the client."
    minimum: 1
  }];
  bytes nonce = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded AES-GCM nonce."
    format: "byte"
  }];
  bytes ciphertext = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded encrypted client payload."
    format: "byte"
  }];
}

message DeleteItemRequest {
  string id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Vault item UUID."
  }];
  int64 expected_revision = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Optimistic concurrency revision expected by the client."
    minimum: 1
  }];
}

message GetItemRequest {
  string id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Vault item UUID."
  }];
}

message ListItemsRequest {
  bool include_deleted = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "When true, deletion tombstones are returned."
  }];
}

message SyncRequest {
  uint64 after_sync_version = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Return changes with sync_version greater than this cursor."
  }];
}

message ItemHeader {
  string id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Vault item UUID."
  }];
  int64 revision = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Optimistic concurrency revision."
  }];
  uint64 sync_version = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Monotonic user sync cursor."
  }];
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  google.protobuf.Timestamp deleted_at = 6;
}

message EncryptedItem {
  ItemHeader header = 1;
  bytes nonce = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded AES-GCM nonce. Empty for tombstones."
    format: "byte"
  }];
  bytes ciphertext = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Base64-encoded encrypted client payload. Empty for tombstones."
    format: "byte"
  }];
}

message DeleteItemResponse {
  ItemHeader header = 1;
}

message ListItemsResponse {
  repeated EncryptedItem items = 1;
}

message SyncResponse {
  repeated EncryptedItem items = 1;
  uint64 current_sync_version = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Current monotonic user sync cursor."
  }];
}
